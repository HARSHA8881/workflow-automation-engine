<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimal dark carbon background -->
  <rect width="256" height="256" rx="64" fill="#0A0A0B"/>
  
  <!-- Subtle 1px border like the UI panels -->
  <rect x="2" y="2" width="252" height="252" rx="62" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4"/>

  <!-- Centered Lightning Path -->
  <g transform="translate(68, 68) scale(5)">
    <!-- Cyan glow effect behind the bolt -->
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="#00E5FF" opacity="0.1" />
    
    <!-- Crisp outline matching the Icons.Lightning component -->
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="none" stroke="#EDEDED" stroke-width="2" stroke-linejoin="round"/>
  </g>
</svg>